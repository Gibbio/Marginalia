[package]
name = "marginalia-tui"
version = "0.1.0"
edition = "2021"
description = "Rust TUI frontend for Marginalia"

[features]
default = []
alpha-compat = []

[dependencies]
crossterm = "0.28"
marginalia-runtime = { path = "../../crates/marginalia-runtime" }
ratatui = { version = "0.29", features = ["unstable-rendered-line-info"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
