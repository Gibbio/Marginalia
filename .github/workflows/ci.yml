name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy apps/cli/src packages/core/src packages/adapters/src packages/infra/src tests

      - name: Test
        run: python -m pytest

      - name: CLI smoke test
        env:
          MARGINALIA_DB_PATH: .marginalia/ci-smoke.sqlite3
        run: |
          python -m marginalia_cli --help
          python -m marginalia_cli doctor --json
          python -m marginalia_cli ingest examples/sample-document.txt --json
          python -m marginalia_cli status --json
