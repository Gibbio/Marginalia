name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux: default features (core, runtime, storage, kokoro-onnx) ──
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (default features)
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --check

  # ── macOS Apple Silicon: mlx-tts, apple-stt, AEC3, espeak-rs ──
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build TUI (apple-stt + mlx-tts)
        run: cargo build -p marginalia-tui --features apple-stt,mlx-tts --release

      - name: Build all default crates
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: cargo doc (no warnings)
        run: cargo doc --no-deps --workspace 2>&1 | (! grep -q "^warning")
