name: CI

on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux: default features (core, runtime, storage, kokoro-onnx) ──
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        # libasound2-dev: required by alsa-sys (cpal/rodio audio playback).
        # pkg-config: resolver for alsa.pc during the alsa-sys build script.
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (default features)
        run: cargo build --release

      - name: Test
        run: cargo test

      # `--workspace` would pull in stt-apple (Swift), stt-vosk (libvosk),
      # stt-whisper (cmake+C++), tts-mlx (Metal Toolchain) — none of which
      # can build on a stock Linux runner. Default members cover everything
      # that is portable and Rust-only.
      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check

  # ── macOS Apple Silicon: mlx-tts, apple-stt, AEC3, espeak-rs ──
  macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build TUI (apple-stt + mlx-tts)
        run: cargo build -p marginalia-tui --features apple-stt,mlx-tts --release

      - name: Build all default crates
        run: cargo build --release

      - name: Test
        run: cargo test

      # Same rationale as Linux clippy: `--workspace` would pull in
      # crates with native deps that the runner isn't set up for. Default
      # members cover the Rust-only portable surface.
      - name: cargo doc (no warnings)
        run: cargo doc --no-deps 2>&1 | (! grep -q "^warning")
