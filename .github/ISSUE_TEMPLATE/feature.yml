name: Feature
description: Track a product or engineering feature.
title: "[Feature] "
labels:
  - type:feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or engineering problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should be built now?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: List the conditions that must be true for completion.
    validations:
      required: true
